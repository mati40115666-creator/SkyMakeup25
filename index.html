<script type="text/babel">
/* Sky Makeup storefront — slide-in cart drawer.
   Two-step checkout: (1) el pedido, con total + aclaración de envío;
   (2) datos bancarios para transferir + envío de comprobante por WhatsApp.
   Composes Button from the design system. */
const { Button: SkyButton } = window.SkyMakeupDesignSystem_ae8c70;

// Datos bancarios de Sky Makeup (transferencia).
const BANK = {
  titular: 'Cielo Oriana Benitez',
  banco: 'Brubank',
  cuit: '27-44233791-3',
  alias: 'cielobenitez.bru',
  cbu: '1430001713039417410016',
  cuenta: '1303941741001',
};

const inputStyle = {
  width: '100%', boxSizing: 'border-box', padding: '12px 14px',
  borderRadius: 'var(--radius-md)', border: 'var(--border-1)',
  fontSize: '.95rem', fontFamily: 'var(--font-body)', color: 'var(--ciruela)',
  background: '#fff',
};

function CartDrawer({ open, items, onClose, onInc, onDec, total, waLink, onFinalize }) {
  const fmt = (n) => '$' + n.toLocaleString('es-AR');
  const entries = Object.entries(items);
  const [step, setStep] = React.useState('cart');
  const [name, setName] = React.useState('');
  const [phone, setPhone] = React.useState('');
  const [sending, setSending] = React.useState(false);
  const canContinue = entries.length > 0 && name.trim().length > 1 && phone.trim().length > 5;

  const finalizeAndSend = async () => {
    setSending(true);
    try { await onFinalize({ name: name.trim(), phone: phone.trim() }); }
    finally { setSending(false); }
  };

  // Al cerrar el carrito o vaciarlo, volvemos al paso 1.
  React.useEffect(() => { if (!open) setStep('cart'); }, [open]);
  React.useEffect(() => { if (entries.length === 0) setStep('cart'); }, [entries.length]);

  const comprobanteMsg = () => {
    const lines = entries.map(([name, item]) => `• ${item.qty}x ${name} — ${fmt(item.price * item.qty)}`);
    return `¡Hola Sky Makeup! 💖 Ya hice la transferencia de mi pedido:\n\n${lines.join('\n')}\n\nTotal productos: ${fmt(total)}\n\nTe adjunto el comprobante ✨ (coordinamos el envío por acá)`;
  };
  const comprobanteHref = waLink ? waLink(comprobanteMsg()) : '#';

  return (
    <React.Fragment>
      <div
        onClick={onClose}
        style={{
          position: 'fixed', inset: 0, background: 'var(--overlay-scrim)', zIndex: 90,
          opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none', transition: 'opacity .2s',
        }}
      />
      <aside
        style={{
          position: 'fixed', top: 0, right: 0, bottom: 0, zIndex: 95,
          width: 'min(420px,100%)', background: 'var(--crema)',
          display: 'flex', flexDirection: 'column',
          transform: open ? 'translateX(0)' : 'translateX(100%)',
          transition: 'transform .25s ease', boxShadow: 'var(--shadow-drawer)',
        }}
      >
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '22px 24px', borderBottom: 'var(--border-1)' }}>
          <h3 style={{ fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: '1.4rem', margin: 0 }}>
            {step === 'cart' ? 'Tu pedido' : 'Datos para transferir'}
          </h3>
          <button onClick={onClose} aria-label="Cerrar carrito" style={{ background: 'none', border: 'none', fontSize: '1.5rem', cursor: 'pointer', color: 'var(--ciruela-60)', lineHeight: 1, padding: '6px' }}>✕</button>
        </div>

        {step === 'cart' ? (
          <React.Fragment>
            <div style={{ flex: 1, overflowY: 'auto', padding: '18px 24px', display: 'flex', flexDirection: 'column', gap: '16px' }}>
              {entries.length === 0 && (
                <p style={{ textAlign: 'center', color: 'var(--ciruela-60)', padding: '50px 20px', fontSize: '.95rem' }}>Tu carrito está vacío. Agregá productos del catálogo ✨</p>
              )}
              {entries.map(([name, item]) => (
                <div key={name} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '12px', background: 'var(--petalo)', border: 'var(--border-1)', borderRadius: 'var(--radius-md)', padding: '14px 16px' }}>
                  <div>
                    <b style={{ fontSize: '.95rem', display: 'block' }}>{name}</b>
                    <span style={{ fontSize: '.85rem', color: 'var(--ciruela-60)' }}>{fmt(item.price)} c/u</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                    <QtyBtn onClick={() => onDec(name)}>−</QtyBtn>
                    <span style={{ minWidth: '20px', textAlign: 'center', fontWeight: 600 }}>{item.qty}</span>
                    <QtyBtn onClick={() => onInc(name)} disabled={item.stock != null && item.qty >= item.stock}>+</QtyBtn>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ padding: '20px 24px 26px', borderTop: 'var(--border-1)' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', marginTop: '4px' }}>
                <input
                  value={name} onChange={(e) => setName(e.target.value)}
                  placeholder="Nombre y apellido"
                  style={inputStyle}
                />
                <input
                  value={phone} onChange={(e) => setPhone(e.target.value)}
                  placeholder="Tu número de WhatsApp"
                  style={inputStyle}
                />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '1.1rem', margin: '14px 0 6px' }}>
                <span>Total</span><b style={{ fontSize: '1.25rem' }}>{fmt(total)}</b>
              </div>
              <p style={{ fontSize: '.8rem', color: 'var(--ciruela-60)', margin: '0 0 16px' }}>
                El envío no está incluido. Coordinamos el costo por WhatsApp al finalizar la compra.
              </p>
              <SkyButton onClick={() => setStep('payment')} disabled={!canContinue} style={{ width: '100%', ...(!canContinue ? { pointerEvents: 'none', opacity: .5 } : {}) }}>Continuar con el pago</SkyButton>
            </div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div style={{ flex: 1, overflowY: 'auto', padding: '18px 24px', display: 'flex', flexDirection: 'column', gap: '14px' }}>
              <div style={{ background: 'var(--petalo)', border: 'var(--border-1)', borderRadius: 'var(--radius-md)', padding: '16px 18px' }}>
                <div style={{ fontSize: '.75rem', fontWeight: 600, letterSpacing: 'var(--tracking-tag)', textTransform: 'uppercase', color: 'var(--chicle)', marginBottom: '4px' }}>Monto a transferir</div>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px' }}>
                  <b style={{ fontSize: '1.5rem', fontFamily: 'var(--font-display)', fontWeight: 400 }}>{fmt(total)}</b>
                  <CopyBtn value={String(total)} />
                </div>
                <p style={{ fontSize: '.78rem', color: 'var(--ciruela-60)', margin: '8px 0 0' }}>Es solo el costo de los productos. El envío se suma aparte cuando lo coordinemos por WhatsApp.</p>
              </div>

              <CopyRow label="Titular" value={BANK.titular} />
              <CopyRow label="Banco" value={BANK.banco} />
              <CopyRow label="Alias" value={BANK.alias} copyable />
              <CopyRow label="CBU" value={BANK.cbu} copyable mono />
              <CopyRow label="N° de cuenta" value={BANK.cuenta} copyable mono />
              <CopyRow label="CUIT/CUIL" value={BANK.cuit} copyable mono />

              <p style={{ fontSize: '.88rem', color: 'var(--ciruela)', textAlign: 'center', margin: '6px 0 0', lineHeight: 1.5 }}>
                Hacé la transferencia y mandanos el comprobante por WhatsApp 💖<br />
                <span style={{ color: 'var(--ciruela-60)', fontSize: '.82rem' }}>Reservamos tu pedido apenas lo recibimos.</span>
              </p>
            </div>
            <div style={{ padding: '18px 24px 24px', borderTop: 'var(--border-1)', display: 'flex', flexDirection: 'column', gap: '10px' }}>
              <SkyButton href={comprobanteHref} target="_blank" rel="noopener noreferrer" onClick={finalizeAndSend} style={{ width: '100%', ...(sending ? { pointerEvents: 'none', opacity: .6 } : {}) }}>{sending ? 'Enviando…' : 'Enviar comprobante por WhatsApp 🛍️'}</SkyButton>
              <SkyButton variant="ghost" onClick={() => setStep('cart')} style={{ width: '100%' }}>Volver al pedido</SkyButton>
            </div>
          </React.Fragment>
        )}
      </aside>
    </React.Fragment>
  );
}

function CopyRow({ label, value, copyable, mono }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '12px', border: 'var(--border-1)', borderRadius: 'var(--radius-md)', padding: '12px 16px' }}>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: '.72rem', fontWeight: 600, letterSpacing: 'var(--tracking-tag)', textTransform: 'uppercase', color: 'var(--ciruela-60)', marginBottom: '2px' }}>{label}</div>
        <div style={{ fontSize: '.98rem', fontWeight: 600, fontFamily: mono ? 'ui-monospace, SFMono-Regular, Menlo, monospace' : 'inherit', wordBreak: 'break-all' }}>{value}</div>
      </div>
      {copyable && <CopyBtn value={value} />}
    </div>
  );
}

function CopyBtn({ value }) {
  const [done, setDone] = React.useState(false);
  const copy = () => {
    try {
      navigator.clipboard.writeText(value).then(() => {
        setDone(true);
        setTimeout(() => setDone(false), 1600);
      });
    } catch (e) {}
  };
  return (
    <button
      onClick={copy}
      style={{
        flexShrink: 0, padding: '7px 14px', borderRadius: 'var(--radius-pill)',
        border: '1.5px solid var(--frambuesa)', cursor: 'pointer',
        background: done ? 'var(--frambuesa)' : 'transparent',
        color: done ? '#fff' : 'var(--frambuesa)',
        fontSize: '.8rem', fontWeight: 600, fontFamily: 'var(--font-body)',
        transition: 'background .12s, color .12s', whiteSpace: 'nowrap',
      }}
    >{done ? 'Copiado ✓' : 'Copiar'}</button>
  );
}

function QtyBtn({ children, onClick, disabled }) {
  const [h, setH] = React.useState(false);
  return (
    <button
      onClick={disabled ? undefined : onClick}
      disabled={disabled}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        width: '30px', height: '30px', borderRadius: '50%',
        border: '1.5px solid var(--frambuesa)',
        background: (h && !disabled) ? 'var(--frambuesa)' : 'transparent',
        color: (h && !disabled) ? '#fff' : 'var(--frambuesa)',
        fontSize: '1rem', fontWeight: 700, cursor: disabled ? 'not-allowed' : 'pointer', lineHeight: 1,
        opacity: disabled ? 0.4 : 1,
        transition: 'background .12s, color .12s',
      }}
    >{children}</button>
  );
}

window.CartDrawer = CartDrawer;

</script>
<script type="text/babel">
/* Sky Makeup storefront — full landing page recreation.
   Composes design-system primitives (Button, Eyebrow, Marquee, CategoryBubble,
   ProductCard, StepCard, TrustItem) + the CartDrawer into the real page layout. */
const SK = window.SkyMakeupDesignSystem_ae8c70;
const { Button, Eyebrow, Marquee, CategoryBubble, ProductCard, StepCard, TrustItem } = SK;

const PRODUCT_CATEGORY_ORDER = ['Rostro', 'Labiales', 'Máscaras y Delineadores', 'Pestañas y Pegamentos'];

// ---- Stock ----
// El stock ahora vive en la base de datos (tabla products.stock, jsonb).
// stockFor lee el jsonb cargado por producto: { _default: n } o { tono: n }.
const stockFor = (p, tone) => {
  const k = tone || '_default';
  return (p.stock && p.stock[k] != null) ? p.stock[k] : 0;
};

// ⚠️ REEMPLAZAR con el número real de WhatsApp (formato internacional sin +, sin espacios).
// Ej. Argentina Santa Fe: 549342XXXXXXX
const WHATSAPP_NUMBER = '5493425931018';
const INSTAGRAM_URL = 'https://www.instagram.com/sky_makeup25';
const waLink = (msg) => `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
const GENERIC_WA_MSG = '¡Hola Sky Makeup! 💖 Quiero hacer un pedido.';

const CATEGORY_ANCHORS = {
  'Rostro': 'cat-rostro',
  'Labiales': 'cat-labiales',
  'Máscaras y Delineadores': 'cat-mascaras',
  'Skincare': 'productos',
  'Pestañas y Pegamentos': 'cat-pestanas',
};

const CATEGORIES = [
  { image: 'assets/category-rostro.jpg', label: 'Rostro', sublabel: 'Bases · Correctores · Rubores · Contornos · Iluminadores' },
  { image: 'assets/category-labiales.jpg', label: 'Labiales', sublabel: 'Mattes · Gloss · Delineadores de labios' },
  { image: 'assets/category-mascaras.jpg', label: 'Máscaras y Delineadores', sublabel: 'Máscaras · Delineadores' },
  { image: 'assets/category-skincare.jpg', label: 'Skincare', sublabel: 'Limpiezas · Hidratantes' },
  { image: 'assets/category-pestanas.jpg', label: 'Pestañas y Pegamentos', sublabel: 'Pestañas · Pegamentos' },
];

const wrap = { maxWidth: '1120px', margin: '0 auto', padding: '0 24px' };
const sectionHead = { maxWidth: '560px', marginBottom: '48px' };
const h2 = { fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 'var(--fs-h2)', lineHeight: 1.15, marginTop: '10px' };
const subP = { marginTop: '12px', color: 'var(--ciruela-60)' };

function Storefront() {
  const [products, setProducts] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [cart, setCart] = React.useState(() => {
    try {
      const saved = localStorage.getItem('sky_cart');
      return saved ? JSON.parse(saved) : {};
    } catch (e) { return {}; }
  });
  const [open, setOpen] = React.useState(false);

  React.useEffect(() => {
    let cancelled = false;
    window.sb.from('products').select('*').eq('active', true).order('sort_order').then(({ data, error }) => {
      if (cancelled) return;
      if (error) { console.error(error); setLoading(false); return; }
      const mapped = (data || []).map((row) => ({
        id: row.id,
        category: row.category,
        title: row.title,
        description: row.description,
        price: '$' + Number(row.price).toLocaleString('es-AR'),
        raw: Number(row.price),
        image: row.image_url,
        fit: row.image_url ? 'contain' : undefined,
        badge: row.badge,
        tones: row.tones,
        stock: row.stock,
      }));
      setProducts(mapped);
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, []);

  React.useEffect(() => {
    try { localStorage.setItem('sky_cart', JSON.stringify(cart)); } catch (e) {}
  }, [cart]);

  const cartKey = (p, tone) => (tone ? `${p.title} · Tono ${tone}` : p.title);
  const remainingFor = (p, tone) => stockFor(p, tone) - (cart[cartKey(p, tone)]?.qty || 0);

  const add = (p, tone) => {
    const key = cartKey(p, tone);
    const stock = stockFor(p, tone);
    setCart((c) => {
      const have = c[key]?.qty || 0;
      if (have >= stock) return c; // sin stock
      const next = { ...c };
      next[key] = { price: p.raw, qty: have + 1, stock, productId: p.id, tone: tone || null };
      return next;
    });
    setOpen(true);
  };
  const inc = (name) => setCart((c) => {
    const item = c[name];
    if (!item || (item.stock != null && item.qty >= item.stock)) return c;
    return { ...c, [name]: { ...item, qty: item.qty + 1 } };
  });
  const dec = (name) => setCart((c) => {
    const next = { ...c };
    if (next[name].qty <= 1) delete next[name];
    else next[name] = { ...next[name], qty: next[name].qty - 1 };
    return next;
  });

  // Al enviar el comprobante: guarda el pedido en la base, descuenta stock real,
  // vacía el carrito y cierra.
  const finalize = async ({ name, phone }) => {
    const items = Object.entries(cart).map(([label, item]) => ({
      title: label, qty: item.qty, price: item.price, productId: item.productId, tone: item.tone,
    }));
    const total = Object.values(cart).reduce((s, i) => s + i.qty * i.price, 0);
    await window.sb.from('orders').insert({
      customer_name: name,
      customer_phone: phone,
      items,
      total,
      status: 'pending',
    });
    for (const item of Object.values(cart)) {
      if (item.productId) {
        await window.sb.rpc('decrement_stock', { p_id: item.productId, p_tone: item.tone, p_qty: item.qty });
      }
    }
    setCart({});
    setOpen(false);
  };

  const count = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  const total = Object.values(cart).reduce((s, i) => s + i.qty * i.price, 0);

  return (
    <div style={{ background: 'var(--petalo)', color: 'var(--ciruela)', minHeight: '100%', position: 'relative', overflow: 'hidden' }}>

          <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 'var(--fs-hero)', lineHeight: 1.08, letterSpacing: '-.01em', maxWidth: '16ch', margin: '26px auto 22px' }}>
            Tu piel merece<br /><span style={{ background: 'linear-gradient(95deg, var(--frambuesa), #DB4F92)', WebkitBackgroundClip: 'text', backgroundClip: 'text', WebkitTextFillColor: 'transparent', color: 'transparent' }}>ese brillo</span>

            <Button href="#productos">Ver catálogo</Button>
            <Button variant="ghost" href={INSTAGRAM_URL} target="_blank" rel="noopener noreferrer">@sky_makeup25</Button>
          </div>
        </div>
      </section>

      <Marquee items={['🚚 Envíos al instante', '📍 Retiro en zona', '💖 Productos aprobados', '💳 Pago por transferencia', '🚚 Envíos al instante', '📍 Retiro en zona', '💖 Productos aprobados', '💳 Todos los medios de pago']} />

          </div>
          <div className="sky-categories">
            {CATEGORIES.map((c) => <CategoryBubble key={c.label} {...c} href={`#${CATEGORY_ANCHORS[c.label]}`} />)}

        </div>
      </section>

      {/* Productos */}

          <div style={sectionHead}>

            <h2 style={h2}>Lo que se está pidiendo</h2>
            <p style={subP}>Stock real, precios directos. Si te gusta, escribinos y te lo reservamos.</p>

            <div key={cat} id={CATEGORY_ANCHORS[cat]} style={{ marginBottom: '46px', scrollMarginTop: '84px' }}>

            <StepCard n={2} title="Pagá por transferencia">Te pasamos los datos bancarios, transferís y nos mandás el comprobante. Te confirmamos al instante.</StepCard>
            <StepCard n={3} title="Recibilo o retiralo">Envíos al instante dentro de Santa Fe o retiro en zona coordinando horario.</StepCard>
          </div>
        </div>
      </section>

      {/* Confianza */}
      <section style={{ padding: '80px 0' }}>

          <span>San Jerónimo 4759, Santa Fe · Skincare &amp; Makeup</span>
          <a href={INSTAGRAM_URL} target="_blank" rel="noopener noreferrer" style={{ color: 'rgba(255,255,255,.85)' }}>@sky_makeup25</a>
        </div>
      </footer>

      {/* Cart FAB */}
      {count > 0 && (

          🛍️
          <span style={{ position: 'absolute', top: '-4px', right: '-4px', minWidth: '24px', height: '24px', padding: '0 6px', borderRadius: '999px', background: 'var(--chicle)', color: '#fff', fontSize: '.8rem', fontWeight: 700, display: 'grid', placeItems: 'center', border: '2px solid var(--petalo)' }}>{count}</span>
        </button>
      )}

      <window.CartDrawer open={open} items={cart} total={total} waLink={waLink} onClose={() => setOpen(false)} onInc={inc} onDec={dec} onFinalize={finalize} />
    </div>
  );
}

const navLink = { textDecoration: 'none', fontSize: '.92rem', fontWeight: 500, color: 'var(--ciruela-60)' };

window.Storefront = Storefront;

</script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<window.Storefront />);
</script>
</body>
</html>
